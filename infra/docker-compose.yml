name: zhipath

# ZhiPath 本地开发基础设施
# 启动：docker compose -f infra/docker-compose.yml up -d
# 应用服务（api/ai/ocr/worker）用 apps profile，代码就绪后 --profile apps 启动

services:
  # ===== MySQL 8.4 =====
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zhipath}
      MYSQL_USER: ${MYSQL_USER:-consult}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-consult}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  # ===== Redis 7.4 =====
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ===== Qdrant 向量库 =====
  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ===== MinIO 对象存储 =====
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ===== MinIO 初始化 bucket =====
  minio-init:
    image: minio/mc:RELEASE.2024-10-02T08-27-28Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin} ${OBJECT_STORAGE_SECRET_KEY:-minioadmin};
      mc mb local/${OBJECT_STORAGE_BUCKET:-zhipath-ai} --ignore-existing;
      echo '✓ bucket ${OBJECT_STORAGE_BUCKET:-zhipath-ai} 已创建';
      "

  # ===== n8n 自动化 =====
  # n8n 已移除：回访/复盘/通知改由 Worker 代码实现（见 app/jobs/notification.py）

  # ===== Qdrant collection 初始化 =====
  qdrant-init:
    image: python:3.12-slim
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      QDRANT_URL: http://qdrant:6333
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
    volumes:
      - ./qdrant:/app:ro
    working_dir: /app
    command: ["python", "init_collections.py"]

  # ===== 以下应用服务需代码就绪后 --profile apps 启动 =====
  api-gateway:
    profiles: [apps]
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: "consult:consult@tcp(mysql:3306)/zhipath?parseTime=true&loc=Local"
      REDIS_URL: redis://redis:6379/0
      AI_AGENT_SERVICE_URL: http://ai-agent-service:8001
      OCR_SERVICE_URL: http://ocr-service:8002
      OBJECT_STORAGE_ENDPOINT: minio:9000
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-zhipath-ai}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token}
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-agent-service:
    profiles: [apps]
    build:
      context: ../services/ai-agent-service
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-local}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token}
    env_file:
      - ../services/ai-agent-service/.env
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  ocr-service:
    profiles: [apps]
    build:
      context: ../services/ocr-service
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      OBJECT_STORAGE_ENDPOINT: minio:9000
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token}
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8002/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker-service:
    profiles: [apps]
    build:
      context: ../services/worker-service
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: "consult:consult@tcp(mysql:3306)/zhipath?parseTime=true&loc=Local"
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
  minio_data:
